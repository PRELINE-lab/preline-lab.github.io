name: Sync to PRELINE-lab

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Push to organization repo
        run: |
          git config --global user.name "ancolli"
          git config --global user.email "actions@github.com"

          git clone https://github.com/PRELINE-lab/web.git target
          rsync -av --delete --exclude '.git' ./ target/

          cd target
          git add .
          git commit -m "sync from ancolli" || echo "no changes"
          git push
